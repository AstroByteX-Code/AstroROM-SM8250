name: Build AstroROM for sm8250
run-name: Building ROM > ${{ inputs.device }}
on:
  workflow_dispatch:
    inputs:
      device:
        description: 'Choose device (x1q, y2q, z3q, r8q, c1q, c2q)'
        required: true
        default: 'y2q'
      upload_cloud:
        description: 'Upload ROM to cloud (PixelDrain)'
        required: false
        default: false
        type: boolean

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Free disk space (1/4) - System Junk
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
          sudo docker builder prune -a

      - name: Free disk space (2/4) - Tool Cache
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          swap-storage: false

      - name: Free disk space (3/4)
        uses: rokibhasansagar/slimhub_actions@main
        with:
          retain: 'compiler_cmake'

      - name: Free disk space (4/4)
        run: |
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf /usr/share/swift
          sudo rm -rf /usr/local/lib/node_modules
          sudo rm -rf /usr/local/share/chromium
          sudo rm -rf /usr/share/sbt
          sudo apt-get clean

      - name: Install F2FS Tools and Load Kernel Module
        run: |
          sudo apt-get update
          sudo apt-get install -y f2fs-tools linux-modules-extra-$(uname -r)
          sudo depmod -a
          sudo modprobe f2fs

      - name: Disk Space Check
        run: df -h /

      - name: Run AstroROM Build
        run: |
          sudo bash build_sm8250.sh --build ${{ inputs.device }}

      - name: Upload ROM to PixelDrain (curl)
        if: ${{ inputs.upload_cloud }}
        env:
          PIXELDRAIN_API_KEY: ${{ secrets.PIXELDRAIN_API_KEY }}
        run: |
          cd out
          ROM_FILE=$(ls *.zip | head -n 1)

          if [ -z "$ROM_FILE" ]; then
            echo "No ROM zip found!"
            exit 1
          fi

          echo "Uploading $ROM_FILE to PixelDrain..."
          RESPONSE=$(curl -s -X POST "https://pixeldrain.com/api/file" \
            -H "Authorization: $PIXELDRAIN_API_KEY" \
            -F "file=@$ROM_FILE")

          echo "PixelDrain response: $RESPONSE"
