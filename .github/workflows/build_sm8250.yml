name: Build AstroROM for sm8250
run-name: Building ROM > ${{ inputs.device }}
on:
  workflow_dispatch:
    inputs:
      device:
        description: 'Choose device (x1q, y2q, z3q, r8q, c1q, c2q)'
        required: true
        default: 'y2q'
      upload_cloud:
        description: 'Upload ROM to cloud (PixelDrain)'
        required: false
        default: false
        type: boolean

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # … your disk space cleanup and build steps …

      - name: Run AstroROM Build
        run: |
          sudo bash build_sm8250.sh --build ${{ inputs.device }}

      - name: Upload ROM to PixelDrain (curl)
        if: ${{ inputs.upload_cloud }}
        env:
          PIXELDRAIN_API_KEY: ${{ secrets.PIXELDRAIN_API_KEY }}
        run: |
          cd out
          ROM_FILE=$(ls *.zip | head -n 1)

          if [ -z "$ROM_FILE" ]; then
            echo "No ROM zip found!"
            exit 1
          fi

          echo "Uploading $ROM_FILE to PixelDrain..."
          RESPONSE=$(curl -s -X POST "https://pixeldrain.com/api/file" \
            -H "Authorization: $PIXELDRAIN_API_KEY" \
            -F "file=@$ROM_FILE")

          echo "PixelDrain response: $RESPONSE"
