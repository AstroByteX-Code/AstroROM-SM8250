name: Build AstroROM
run-name: Building ROM > c2q
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Free disk space (1/4) - System Junk
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
          sudo docker builder prune -a

      - name: Free disk space (2/4) - Tool Cache
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          swap-storage: false

      - name: Free disk space (3/4)
        uses: rokibhasansagar/slimhub_actions@main
        with:
          retain: 'compiler_cmake'

      - name: Free disk space (4/4)
        run: |
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf /usr/share/swift
          sudo rm -rf /usr/local/lib/node_modules
          sudo rm -rf /usr/local/share/chromium
          sudo rm -rf /usr/share/sbt
          sudo apt-get clean

      - name: Disk Space Check
        run: df -h /

      - name: Run AstroROM Build (c2q)
        run: |
          sudo bash build.sh --build c2q

      - name: Download PixelDrain CLI (pd)
        run: |
          curl -L https://github.com/jkawamoto/go-pixeldrain/releases/download/v0.7.6/pd_0.7.6_linux_amd64.tar.gz -o pd.tar.gz
          tar -xvf pd.tar.gz
          chmod +x pd
          sudo mv pd /usr/local/bin/pd

      - name: Upload ROM to PixelDrain
        env:
          PIXELDRAIN_API_KEY: 800269c5-1f1f-4966-a85c-fdf7de2dde31
        run: |
          cd out
          ROM_FILE=$(ls *.zip | head -n 1)

          if [ -z "$ROM_FILE" ]; then
            echo "No ROM zip found!"
            exit 1
          fi

          echo "Uploading $ROM_FILE to PixelDrain..."
          pd --api-key "$PIXELDRAIN_API_KEY" upload "$ROM_FILE" | sed 's|api/file|u|g'
