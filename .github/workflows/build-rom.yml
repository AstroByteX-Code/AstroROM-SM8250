name: Build AstroROM
run-name: Building ROM > c2q
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Free disk space (1/4) - System Junk
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
          sudo docker builder prune -a

      - name: Free disk space (2/4) - Tool Cache
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          swap-storage: false

      - name: Free disk space (3/4)
        uses: rokibhasansagar/slimhub_actions@main
        with:
          retain: 'compiler_cmake'

      - name: Free disk space (4/4)
        run: |
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf /usr/share/swift
          sudo rm -rf /usr/local/lib/node_modules
          sudo rm -rf /usr/local/share/chromium
          sudo rm -rf /usr/share/sbt
          sudo apt-get clean

      - name: Disk Space Check
        run: df -h /

      - name: Run AstroROM Build (c2q)
        run: |
          sudo bash build.sh --build c2q

      - name: Locate built ROM ZIP
        id: rom
        run: |
          ROM_PATH=$(find out -type f -name '*.zip' | head -n 1)

          if [ -z "$ROM_PATH" ]; then
            echo "No ROM zip found!"
            exit 1
          fi

          echo "rom_path=$ROM_PATH" >> "$GITHUB_OUTPUT"
          echo "Found ROM: $ROM_PATH"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: astro-rom-c2q-${{ github.run_number }}
          name: AstroROM c2q Build ${{ github.run_number }}
          body: Automated build from GitHub Actions.
          files: ${{ steps.rom.outputs.rom_path }}
          draft: false
          prerelease: false
          generate_release_notes: true
